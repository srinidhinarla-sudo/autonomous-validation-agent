name: CI — Autonomous Validation Agent

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:
    branches: ["main"]

env:
  MUTATION_KILL_RATE_MIN: 88   # fail if mutmut kill rate drops below this

jobs:
  # ============================================================
  # 1. Build C++ state machine + pybind11 bindings
  # ============================================================
  build:
    name: Build C++ / pybind11
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential python3-dev

      - name: Install Python build dependencies
        run: pip install pybind11 wheel setuptools

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPython3_EXECUTABLE=$(which python3)

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Verify module loads
        run: python3 -c "import infotainment_sm as sm; print('States:', int(sm.State.STATE_COUNT))"

      - name: Upload built module
        uses: actions/upload-artifact@v4
        with:
          name: infotainment-sm-so
          path: infotainment_sm*.so
          retention-days: 1

  # ============================================================
  # 2. Full pytest suite (unit + integration + fuzz)
  # ============================================================
  test:
    name: pytest suite
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download built module
        uses: actions/download-artifact@v4
        with:
          name: infotainment-sm-so

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run unit + integration + invariant tests
        run: |
          pytest tests/test_unit.py tests/test_integration.py \
                 tests/test_invariants_direct.py \
            -v --tb=short \
            --junitxml=reports/unit-integration.xml

      - name: Run fuzz tests
        run: |
          pytest tests/test_fuzz.py \
            -v --tb=short \
            --junitxml=reports/fuzz.xml

      - name: Run visual regression tests
        run: |
          # First run: generate baselines
          pytest tests/test_visual_regression.py \
            --generate-baseline -q || true
          # Second run: compare
          pytest tests/test_visual_regression.py \
            -v --tb=short \
            --junitxml=reports/visual.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/

      - name: Upload visual regression diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: screenshots/diffs/
          retention-days: 7

  # ============================================================
  # 3. Flaky-test detection (repeat each test 3×)
  # ============================================================
  flaky-detection:
    name: Flaky test detection
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download built module
        uses: actions/download-artifact@v4
        with:
          name: infotainment-sm-so

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-repeat

      - name: Run tests with repetition
        run: |
          pytest tests/test_unit.py tests/test_fuzz.py \
            --count=3 \
            -v --tb=short \
            --junitxml=reports/flaky.xml \
            -q 2>&1 | tee flaky_output.txt

      - name: Detect flaky tests
        run: |
          python3 - <<'EOF'
          import re, sys
          with open("flaky_output.txt") as f:
              content = f.read()
          # A test is flaky if it passed on some runs and failed on others.
          # pytest-repeat marks reruns; we look for mixed PASSED/FAILED patterns.
          passed = set(re.findall(r"PASSED (.+?) \[", content))
          failed = set(re.findall(r"FAILED (.+?) \[", content))
          flaky  = passed & failed
          if flaky:
              print(f"FLAKY TESTS DETECTED ({len(flaky)}):")
              for t in sorted(flaky):
                  print(f"  - {t}")
              sys.exit(1)
          else:
              print("No flaky tests detected.")
          EOF

      - name: Upload flaky report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-detection-report
          path: reports/flaky.xml

  # ============================================================
  # 4. Mutation testing gate (mutmut, ≥88 % kill rate)
  # ============================================================
  mutation-testing:
    name: Mutation testing gate
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download built module
        uses: actions/download-artifact@v4
        with:
          name: infotainment-sm-so

      - name: Install dependencies
        run: pip install -r requirements.txt mutmut

      - name: Run mutmut
        run: |
          mutmut run \
            --paths-to-mutate python/ \
            --tests-dir tests/ \
            --runner "pytest tests/test_unit.py tests/test_integration.py -x -q" \
            --no-progress \
            2>&1 | tee mutmut_output.txt || true

      - name: Check kill rate gate
        run: |
          python3 - <<'EOF'
          import re, sys, os

          with open("mutmut_output.txt") as f:
              content = f.read()

          # Parse mutmut results
          killed_match  = re.search(r"(\d+) killed",   content)
          survived_match= re.search(r"(\d+) survived", content)
          timeout_match = re.search(r"(\d+) timeout",  content)

          if not killed_match:
              print("Could not parse mutmut output — skipping gate.")
              sys.exit(0)

          killed   = int(killed_match.group(1))
          survived = int(survived_match.group(1)) if survived_match else 0
          timeout  = int(timeout_match.group(1))  if timeout_match  else 0

          total    = killed + survived + timeout
          kill_rate = 100.0 * killed / total if total > 0 else 0.0
          threshold = int(os.environ.get("MUTATION_KILL_RATE_MIN", "88"))

          print(f"Mutmut results: killed={killed} survived={survived} "
                f"timeout={timeout} total={total}")
          print(f"Kill rate: {kill_rate:.1f}% (threshold: {threshold}%)")

          if kill_rate < threshold:
              print(f"FAIL: kill rate {kill_rate:.1f}% < {threshold}%")
              sys.exit(1)
          else:
              print(f"PASS: kill rate {kill_rate:.1f}% >= {threshold}%")
          EOF

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-testing-results
          path: |
            mutmut_output.txt
            .mutmut-cache

  # ============================================================
  # 5. Coverage gate (≥90 % transition coverage via model-based)
  # ============================================================
  coverage-gate:
    name: Transition coverage gate
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download built module
        uses: actions/download-artifact@v4
        with:
          name: infotainment-sm-so

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check transition coverage
        run: |
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from python.model_based_generator import ModelBasedGenerator

          gen = ModelBasedGenerator(target_coverage=0.90)
          seqs = gen.generate_sequences()
          print(gen.coverage_report())

          if gen.current_coverage < 0.90:
              print(f"FAIL: coverage {gen.current_coverage*100:.1f}% < 90%")
              sys.exit(1)
          else:
              print(f"PASS: coverage {gen.current_coverage*100:.1f}% >= 90%")
          EOF
